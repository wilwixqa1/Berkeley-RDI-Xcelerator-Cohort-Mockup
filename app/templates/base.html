<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Berkeley Xcelerator Cohort{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/base.css">
  {% block head %}{% endblock %}
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="/" class="brand">
        <img src="/static/img/rdi-logo.png" alt="UC Berkeley Center for Responsible, Decentralized Intelligence" class="brand-logo" />
        <span class="brand-product">Xcelerator</span>
      </a>
      <nav class="site-nav">
        <a href="/yc-style">Cohort (YC style)</a>
        <a href="/a16z-style">Cohort (a16z style)</a>
        <a href="https://rdi.berkeley.edu/xcelerator" target="_blank" rel="noopener">About the Program ↗</a>
      </nav>
    </div>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  {% block partners %}{% endblock %}

  <footer class="site-footer">
    <div class="container">
      <p>Berkeley Center for Responsible, Decentralized Intelligence</p>
      <p class="muted">Mockup — internal review only</p>
    </div>
  </footer>

  {% block scripts %}{% endblock %}
</body>
</html>
